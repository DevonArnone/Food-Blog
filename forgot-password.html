<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Request a password reset for your Forks & Freedom account.">
    <title>Forks & Freedom | Forgot Password</title>
    <link rel="stylesheet" href="styles/site.css">
    <script src="javascript/site.js" defer></script>
    <script src="javascript/config.js" defer></script>
    <script src="javascript/auth.js" defer></script>
</head>
<body>
    <header data-site-header></header>
    <main class="page-shell">
        <section class="page-hero auth-hero">
            <article class="hero-copy">
                <span class="eyebrow">Password Reset</span>
                <h1>Request a reset for your account.</h1>
                <p>This demo keeps the flow realistic without a backend mailer. The reset request is still captured and surfaced clearly.</p>
            </article>
        </section>
        <section class="auth-layout auth-layout--single">
            <article class="detail-card auth-card">
                <div class="detail-section-heading">
                    <span class="pill">Reset Password</span>
                    <h2>Enter the email tied to your account</h2>
                </div>
                <p class="status-banner" data-auth-message="forgot-password" hidden></p>
                <form class="form-grid" data-forgot-password-form>
                    <div class="input-group">
                        <label for="forgot-email">Email</label>
                        <input id="forgot-email" name="email" type="email" placeholder="jordan@example.com" required>
                    </div>
                    <button class="button" type="submit">Request Reset</button>
                </form>
                <div class="auth-footer-links">
                    <a href="login.html">Back to login</a>
                    <a href="signup.html">Need a new account?</a>
                </div>
            </article>
        </section>
    </main>
    <footer data-site-footer></footer>
</body>
</html>
